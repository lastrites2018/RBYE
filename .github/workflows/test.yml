name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: oven-sh/setup-bun@v2
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: bun test
      - run: pnpm build
      - run: |
          test -s public/sitemap.xml
          grep -q "<urlset" public/sitemap.xml
